<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueOS | C2 3D Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-deep-slate text-white font-inter overflow-hidden m-0 p-0 w-full h-screen relative">
    
    <!-- 3D Environment Canvas -->
    <div id="canvas-container" class="absolute inset-0 w-full h-full z-0"></div>

    <!-- HUD Overlay -->
    <div id="hud" class="absolute inset-0 z-10 pointer-events-none p-6 flex flex-col justify-between">
        
        <!-- Header HUD -->
        <header class="flex justify-between items-center w-full pointer-events-none">
            <div class="logo-card glass-card p-4 rounded-xl flex items-center gap-4 pointer-events-auto">
                <div>
                    <h1 class="m-0 whitespace-nowrap font-outfit text-2xl font-bold tracking-tight text-cyan-400 drop-shadow-neon">VENUE<span class="text-white">OS</span> C2</h1>
                    <p class="m-0 whitespace-nowrap text-slate-300 text-xs tracking-wider">3D ISOMETRIC OVERVIEW</p>
                </div>
                <div class="h-8 w-px bg-cyan-900/50"></div>
                <div>
                    <p class="text-[10px] text-cyan-500 font-bold tracking-widest mb-1">STATUS</p>
                    <div id="connection-status" class="flex items-center gap-2 text-xs font-bold text-green-400">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse drop-shadow-neon"></span> NOMINAL
                    </div>
                </div>
            </div>

            <!-- Global Metrics -->
            <div class="flex gap-4 header-metrics pointer-events-auto">
                <div class="metric-pill glass-card p-4 rounded-xl min-w-[120px] border-cyan-500/30 border-b-2">
                    <p class="text-[10px] text-cyan-500 font-bold tracking-widest mb-1 uppercase">Occupants</p>
                    <p id="total-occupancy" class="text-3xl font-outfit font-bold drop-shadow-sm">0</p>
                </div>
                <div class="metric-pill glass-card p-4 rounded-xl min-w-[120px] border-green-500/30 border-b-2">
                    <p class="text-[10px] text-green-500 font-bold tracking-widest mb-1 uppercase">Space Left</p>
                    <p id="space-left" class="text-3xl font-outfit font-bold text-green-400 drop-shadow-sm">0</p>
                </div>
                <div class="metric-pill glass-card p-4 rounded-xl min-w-[120px] border-amber-500/30 border-b-2">
                    <p class="text-[10px] text-amber-500 font-bold tracking-widest mb-1 uppercase">Warnings</p>
                    <p id="active-alerts-count" class="text-3xl font-outfit font-bold text-amber-400 drop-shadow-neon-amber">0</p>
                </div>
            </div>
        </header>

        <!-- Main Body HUD (Bottom area) -->
        <main class="flex justify-between items-end h-full mt-4 pointer-events-none">
            
            <!-- Left Side / Assets (Desktop Only usually) -->
            <div id="asset-sidebar" class="sidebar-left w-72 flex flex-col gap-4 pointer-events-auto">
                <div class="glass-card p-4 rounded-xl border-l-2 border-cyan-500">
                    <h3 class="text-[10px] font-bold text-cyan-500 mb-3 tracking-widest">ASSET MANAGEMENT</h3>
                    <div class="space-y-3 text-xs">
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                            <span class="flex items-center gap-2 text-slate-300">
                                <span class="w-2 h-2 bg-green-400 rounded-sm"></span> Security Units
                            </span>
                            <span class="font-bold text-cyan-400">42 Active</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                            <span class="flex items-center gap-2 text-slate-300">
                                <span class="w-2 h-2 bg-red-400 rounded-full"></span> Medical Teams
                            </span>
                            <span class="font-bold text-red-300">7 Standby</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side / Feed (Bottom Sheet on Mobile) -->
            <div id="feed-sidebar" class="sidebar-right w-96 flex flex-col h-[60%] max-h-[400px] pointer-events-auto">
                <div class="glass-card p-4 rounded-xl flex-1 flex flex-col overflow-hidden border-t-2 border-amber-500/50">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-bold text-amber-500 tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-ping"></span>
                            INCIDENT FEED
                        </h3>
                    </div>
                    <div id="alerts-feed" class="flex-1 overflow-y-auto space-y-2 pr-1 scrollbar-thin">
                        <div class="text-slate-500 italic text-center py-6 text-xs">No active incidents</div>
                    </div>
                </div>
            </div>

        </main>
        
        <!-- Controls Helper -->
        <div class="text-center mt-2 pointer-events-none controls-helper">
            <span class="text-[10px] tracking-widest text-slate-500 uppercase">3D Map Active: Drag to Rotate | Pinch to Zoom</span>
        </div>
    </div>

    <!-- Mobile Navigation Toggle -->
    <button id="mobile-toggle" class="mobile-toggle-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bell"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    </button>

    <!-- 3D Interactive Tooltips -->
    <div id="hover-tooltip" class="absolute z-60 pointer-events-none opacity-0 transition-opacity duration-200 glass-card p-3 rounded-lg border-l-4 border-cyan-500 transform -translate-x-1/2 -translate-y-[120%]">
        <h4 id="tooltip-name" class="font-outfit font-bold text-sm text-cyan-400 drop-shadow-neon uppercase tracking-wide">Zone Name</h4>
        <div class="flex gap-4 mt-1 text-[10px] text-slate-300 uppercase tracking-widest">
            <span id="tooltip-cap">Cap: 0</span>
            <span id="tooltip-den" class="font-bold text-amber-400">0%</span>
        </div>
    </div>

    <!-- Section Details Panel -->
    <div id="click-panel" style="left: 340px; top: 150px;" class="absolute z-60 pointer-events-none opacity-0 transition-opacity duration-300 glass-card p-4 rounded-xl border-l-2 border-amber-500 w-64">
        <h4 id="click-name" class="font-outfit font-bold text-amber-500 text-lg uppercase tracking-wide">Zone Name</h4>
        <p class="text-[10px] tracking-widest text-cyan-500 mb-3">SECTIONS MAP</p>
        <div id="click-sections" class="flex flex-wrap gap-2 text-xs font-bold font-outfit text-white">
            <!-- Badges injected here -->
        </div>
    </div>

    <!-- We load scripts as ES modules -->
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
