<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueOS | Operator Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-deep-slate text-white font-inter">
    <div id="app" class="min-h-screen flex flex-col p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 glass-card p-6 rounded-2xl">
            <div>
                <h1 class="font-outfit text-3xl font-bold tracking-tight text-cyan-400">VENUE<span class="text-white">OS</span></h1>
                <p class="text-slate-400 text-sm">Real-time Intelligence System | Operational Tiers: <span id="health-status" class="text-green-400 font-bold">FULL</span></p>
            </div>
            <div class="flex gap-6">
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase font-bold">Total Occupancy</p>
                    <p id="total-occupancy" class="text-3xl font-outfit font-bold">0</p>
                </div>
                <div class="h-12 w-px bg-slate-700"></div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase font-bold">Active Alerts</p>
                    <p id="active-alerts-count" class="text-3xl font-outfit font-bold text-amber-500">0</p>
                </div>
            </div>
        </header>

        <!-- Main Grid -->
        <main class="grid grid-cols-12 gap-6 flex-1">
            
            <!-- Left Panel: Heatmap -->
            <section class="col-span-8 glass-card rounded-2xl p-6 relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold font-outfit flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                        VENUE HEATMAP
                    </h2>
                    <div class="flex gap-4 text-xs">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-500"></span> Clear</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-amber-500"></span> Moderate</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-500"></span> Congested</span>
                    </div>
                </div>
                
                <div class="heatmap-container relative w-full h-[500px] border border-slate-700 bg-slate-900/50 rounded-xl">
                    <canvas id="heatmap-canvas" class="w-full h-full"></canvas>
                    <div id="zone-labels" class="absolute inset-0 pointer-events-none"></div>
                </div>
            </section>

            <!-- Right Panel: Alerts & Queues -->
            <section class="col-span-4 flex flex-col gap-6">
                
                <!-- Occupancy Gauge -->
                <div class="glass-card rounded-2xl p-6 flex-1 max-h-[250px]">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase">Venue Capacity</h3>
                    <div class="flex justify-center items-center h-full">
                        <canvas id="occupancy-gauge" width="200" height="150"></canvas>
                    </div>
                </div>

                <!-- Live Alerts -->
                <div class="glass-card rounded-2xl p-6 flex-[2] overflow-hidden flex flex-col">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase">Recent Incidents</h3>
                    <div id="alerts-feed" class="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-thin">
                        <div class="text-slate-500 italic text-center py-10">No active incidents</div>
                    </div>
                </div>

            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-6 flex justify-between items-center text-xs text-slate-500">
            <p>&copy; 2026 VenueOS | Systems Engineering Division</p>
            <div id="connection-status" class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500"></span> Disconnected
            </div>
        </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
